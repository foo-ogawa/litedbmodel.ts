[package]
name = "lm_orm"
version = "0.0.0"
edition = "2021"
publish = false

# The #63 ORM-plan executor (consumes generated/orm-plan.json; the shipped thin-runtime + live
# driver seam). It self-measures and writes a FLAT CSV (no wire protocol, no serde_json).
[[bin]]
name = "lm_orm"
path = "src/orm.rs"

[dependencies]
# `livedb` pulls in the runtime's ASYNC + connection-pool Postgres + MySQL drivers
# (tokio-postgres + deadpool-postgres / sqlx on the tokio runtime) — the SAME sync-facing
# `Driver` seam `livedb_runner` uses.
litedbmodel_runtime = { path = "../../../../rust/litedbmodel_runtime", features = ["livedb"] }
behavior-contracts = "0.8.0"

[profile.release]
opt-level = 3
