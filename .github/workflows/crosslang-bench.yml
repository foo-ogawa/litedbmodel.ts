name: Cross-lang bench drift-check (#63)

# The unified cross-language benchmark (benchmark/crosslang, epic #63) measures each language's
# thin generic runtime executing the SAME 19 ORM ops DB-backed on all 3 real dialects. It consumes
# a GENERATED artifact (generated/orm-plan.json — the 19 ops' per-dialect statement plans) that must
# NOT drift from what src/ compiles. This CI hook: rebuilds the SCP dist, drift-checks the artifact,
# runs the fairness/coverage self-check, and executes the 19 ops on real sqlite+PG+MySQL (the
# execute-parity gate — #67: string-compare alone let a parser-invalid statement through).

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmark/crosslang/**'
      - 'test/parity/**'
      - '.github/workflows/crosslang-bench.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci --ignore-scripts
      # `npm ci --ignore-scripts` skips better-sqlite3's native `install`, so the addon is absent.
      # Rebuild it explicitly (prebuild first, node-gyp from-source fallback) — same as conformance.yml.
      - name: Build the better-sqlite3 native addon (skipped by ignore-scripts)
        run: npm_config_ignore_scripts=false npm rebuild better-sqlite3 --build-from-source=false || (cd node_modules/better-sqlite3 && npx node-gyp rebuild --release)
      - name: Build SCP dist (consume-only source for the bench)
        run: npm run build:scp
      - name: Bring up the live DBs (PG :5433, MySQL :3307)
        run: npm run docker:livedb:up && sleep 8
      - name: Drift-check the generated ORM-plan artifact
        run: npx tsx benchmark/crosslang/gen-orm-plan.ts --check
      - name: Fairness + coverage self-check (19 ops, queries/op + rows/op)
        run: TEST_DB_HOST=localhost TEST_DB_PORT=5433 TEST_MYSQL_PORT=3307 npx tsx benchmark/crosslang/selfcheck.ts
      - name: Execute-parity — all 19 ops run DB-backed on sqlite + PG + MySQL (#67 gate)
        run: npm run parity:execute
      - name: Smoke the TS bench matrix (quick, real DBs)
        run: CROSSLANG_ONLY=ts BENCH_ITER=30 BENCH_WARMUP=5 BENCH_TP_ITER=30 TEST_DB_HOST=localhost TEST_DB_PORT=5433 TEST_MYSQL_PORT=3307 npx tsx benchmark/crosslang/run.ts
      - name: Tear down the live DBs
        if: always()
        run: npm run docker:livedb:down
