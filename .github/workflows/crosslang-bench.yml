name: Cross-lang codegen gates (#107 / #113)

# The unified cross-language benchmark (benchmark/crosslang) drives ONE codegen path through bc's CLI
# and commits the emitted native/typed modules. Two compiler-measured gates protect them:
#   • drift  (#111) — re-lower + re-generate every op via the bc CLI and byte-diff the committed
#                     adapters/<lang>/generated modules (they must not drift from what src/ compiles).
#   • purity (#113) — the committed native/typed modules are what their tier claims: rust compiles
#                     standalone with NO behavior_contracts extern, go's transitive deps carry no
#                     bc-runtime / encoding/json, ts imports only bc VALUE helpers (baked straight-line).
#                     py/php are the ir (interpreter) tier — labeled, not native-gated.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmark/crosslang/**'
      - 'conformance/codegen/**'
      - '.github/workflows/crosslang-bench.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codegen-gates:
    runs-on: ubuntu-latest
    env:
      # The bc codegen CLI, resolved from the installed npm dependency (the `bc` bin) rather than a
      # sibling checkout — so the drift gate re-generates against the SAME bc the repo pins.
      BC_CLI: ${{ github.workspace }}/node_modules/behavior-contracts/dist/cli.js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up Go (for go-native purity + conformance compile checks)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Set up Rust (for rust-native purity + conformance compile checks)
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install
        run: npm ci --ignore-scripts
      # `npm ci --ignore-scripts` skips better-sqlite3's native install; rebuild it (conformance:codegen
      # executes the emitted TS module against an in-memory sqlite DB).
      - name: Build the better-sqlite3 native addon (skipped by ignore-scripts)
        run: npm_config_ignore_scripts=false npm rebuild better-sqlite3 --build-from-source=false || (cd node_modules/better-sqlite3 && npx node-gyp rebuild --release)
      - name: Build SCP dist (consume-only source for the bench)
        run: npm run build:scp
      - name: Drift gate — committed codegen modules match a fresh bc-CLI regeneration (#111)
        run: npm run bench:codegen:drift
      - name: Purity gate — native (rust/go) runtime-free + typed (ts) value-helper baked (#113)
        run: npm run bench:codegen:purity
      - name: Conformance codegen — emit + compile + byte-identical exec on the frozen vectors
        run: npm run conformance:codegen
