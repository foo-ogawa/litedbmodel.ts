name: Publish Runtime to PyPI

# Publishes the Python SCP runtime (`litedbmodel-runtime`) to PyPI. Mirrors graphddb's
# publish-pypi.yml: the runtime version is the npm package.json SSoT (synced into
# python/pyproject.toml by scripts/sync-versions.mjs), and the job is idempotent — if that
# exact version is already on PyPI it skips (so a release that didn't touch the runtime never
# double-publishes).
#
# OWNER GATE: this job targets the `release` GitHub Environment. Configure that Environment with
# required reviewers (Settings → Environments → release) so the publish waits for an explicit
# owner approval — publish is NOT automatic on merge. Requires the repo secret PYPI_API_TOKEN.

on:
  # The GitHub Release is created by the "GitHub Release" workflow using the default GITHUB_TOKEN,
  # and GitHub does NOT re-trigger workflows from a token-created release event — so
  # `release: published` alone never fires here. Chain off the "GitHub Release" workflow completing
  # instead (same pattern as the npm publisher). `workflow_dispatch` allows a manual publish.
  release:
    types: [published]
  workflow_run:
    workflows: ["GitHub Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: >-
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync runtime version from the npm package SSoT
        id: pkg
        run: |
          node scripts/sync-versions.mjs
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Decide whether publish is needed
        id: need
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="${{ steps.pkg.outputs.version }}"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/litedbmodel-runtime/${VERSION}/json")
          if [ "$CODE" = "200" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on PyPI"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tooling
        if: steps.need.outputs.publish == 'true'
        run: python -m pip install --upgrade build twine pip-audit

      - name: Audit runtime dependencies
        if: steps.need.outputs.publish == 'true'
        run: |
          python -c "import tomllib; open('audit-requirements.txt','w').write('\n'.join(tomllib.load(open('python/pyproject.toml','rb'))['project']['dependencies']))"
          pip-audit --strict -r audit-requirements.txt

      - name: Build sdist and wheel
        if: steps.need.outputs.publish == 'true'
        working-directory: python
        run: python -m build

      - name: Check distribution metadata
        if: steps.need.outputs.publish == 'true'
        working-directory: python
        run: twine check dist/*

      - name: Publish to PyPI
        if: steps.need.outputs.publish == 'true'
        working-directory: python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
