name: Conformance & Release Discipline

# WS7a (#30) skeleton — the multi-language conformance LOCK + release-discipline gates for the
# litedbmodel v2 SCP §8 artifact. WS7b-e extend the `langs` matrix with the real per-language
# runtime builds + vector runners; WS7a wires the TS reference leg + the version/no-local-deps
# gates + the scaffold build checks so every language skeleton stays buildable.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Release discipline: version SSoT + no escaping local deps ───────────────
  release-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Version SSoT in lockstep (npm → PyPI/crates/Go-tag/Packagist)
        run: npm run sync:versions:check
      - name: No local (../-escaping) dependencies
        run: npm run deps:check

  # ── TS reference conformance: corpus is byte-true + the TS runner is green ──
  conformance-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build the SCP dist artifact (consumed by the vectors runner)
        run: npm run build:scp
      - name: Corpus drift gate + TS reference runner (part of the suite)
        run: npx vitest run test/scp/conformance-vectors.test.ts
      - name: Cross-language orchestrator (TS leg; WS7b-e languages auto-join)
        run: npx tsx conformance/vectors-run.ts
      - name: Frozen golden unchanged (additive-refreeze)
        run: |
          npx tsx conformance/vectors-runner.ts > /tmp/ts-summary.json 2>/dev/null
          diff <(jq -S . conformance/frozen/ts-golden.frozen.json) <(jq -S . /tmp/ts-summary.json)

  # ── Language scaffolds stay buildable (WS7b-e fill in the runtime bodies) ───
  scaffold-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, go, rust, php]
    steps:
      - uses: actions/checkout@v4
      - name: Python — package imports
        if: matrix.lang == 'python'
        run: |
          python3 -m py_compile python/litedbmodel_runtime/*.py
      - name: Go — setup
        if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          # The WS7c Go runtime consumes behavior-contracts + a pure-Go SQLite (modernc); the
          # dependency graph's `go` floors require a modern toolchain (mirrors graphddb's go leg).
          go-version: '1.25'
      - name: Go — auth for the private behavior-contracts VCS-tag dependency
        if: matrix.lang == 'go'
        env:
          # behavior-contracts is a PRIVATE repo pinned by VCS tag (go/v0.2.0) — NO local replace.
          # Resolving it needs GOPRIVATE + an authenticated git rewrite (token in secrets).
          GH_TOKEN: ${{ secrets.BEHAVIOR_CONTRACTS_TOKEN }}
        run: |
          echo "GOPRIVATE=github.com/foo-ogawa/*" >> "$GITHUB_ENV"
          echo "GOFLAGS=-mod=mod" >> "$GITHUB_ENV"
          if [ -n "$GH_TOKEN" ]; then
            git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Go — build
        if: matrix.lang == 'go'
        run: cd go && go build ./...
      - name: Rust — check
        if: matrix.lang == 'rust'
        run: cd rust && cargo check
      - name: PHP — lint
        if: matrix.lang == 'php'
        run: |
          php -l php/src/Runtime.php
          php -l php/conformance/vectors_runner.php

  # ── WS7g (#36): coordinated cross-language LIVE-DB validation (real PG + MySQL) ──
  # Each of Python/Go/PHP/Rust runs the exec/tx bundles compiled for postgres + mysql against a
  # REAL dockerized Postgres 16 + MySQL 8 (GitHub `services:`, host-published ports), asserting the
  # assembled result equals the frozen SQLite reference (§10). NO mock, NO silent skip — a leg that
  # can't reach the DB exits 3 and fails the job. Each language isolates its tables in its own
  # namespace (scp_py / scp_go / scp_php / scp_rust) so the one stack has no cross-contamination.
  conformance-livedb:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 2s --health-timeout 5s --health-retries 15
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -prootpass"
          --health-interval 2s --health-timeout 5s --health-retries 15
    env:
      # Host-published service ports (match docker-compose.livedb.yml + the runners' defaults).
      TEST_DB_HOST: localhost
      TEST_DB_PORT: "5433"
      TEST_MYSQL_HOST: "127.0.0.1"
      TEST_MYSQL_PORT: "3307"
      GOPRIVATE: github.com/foo-ogawa/*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, pdo_mysql, mbstring
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Grant the test user the per-language `scp_%` MySQL databases
        run: |
          mysql -h 127.0.0.1 -P 3307 -u root -prootpass \
            -e "GRANT ALL PRIVILEGES ON \`scp\_%\`.* TO 'testuser'@'%'; FLUSH PRIVILEGES;"
      - name: Auth for the private behavior-contracts Go VCS-tag dependency
        env:
          GH_TOKEN: ${{ secrets.BEHAVIOR_CONTRACTS_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install Node deps + Python DB drivers + PHP deps
        run: |
          npm ci --ignore-scripts
          npm install behavior-contracts@0.2.0 --no-save
          npm rebuild better-sqlite3 || (cd node_modules/better-sqlite3 && npx node-gyp rebuild --release)
          python3 -m pip install "psycopg[binary]" pymysql behavior-contracts==0.2.0
          composer -d php install
      - name: Build the SCP dist artifact (consumed by the corpus generator)
        run: npm run build:scp
      - name: Generate the live-DB corpus (pg+mysql bundles; cross-checked vs frozen)
        run: npm run conformance:gen:livedb
      - name: Run all 4 language live-DB legs against real PG + MySQL
        run: npm run conformance:livedb
